# Production / Raspberry Pi deploy (issue #50).
#
# The Pi PULLS a prebuilt multi-arch image from GHCR — it never builds from
# source (the Vite build is too memory-hungry for a Pi 3B+). Watchtower checks
# for a newer image on an interval and recreates the container automatically, so
# pushing to main rolls out to the display hands-off.
#
#   docker compose pull && docker compose up -d     # first run / manual update
#
# Developers building the image locally instead: see docker-compose.build.yml.
services:
  split-flap:
    image: ghcr.io/jeffstrout/split-flap:${IMAGE_TAG:-latest}
    container_name: split-flap
    restart: unless-stopped
    # Opt this container in to Watchtower auto-updates (scoped by label below).
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    ports:
      - "${HOST_PORT:-8080}:3001"   # display + API -> http://<pi-ip>:8080
    environment:
      # All optional — these fall back to the app's built-in defaults.
      # Override by creating a .env file (see .env.example).
      TZ: ${TZ:-UTC}                              # e.g. America/Chicago
      DEFAULT_MODE: ${DEFAULT_MODE:-qlock}        # qlock | flip
      DEFAULT_QLOCK_LANG: ${DEFAULT_QLOCK_LANG:-en}  # en | ar
      PERSIST_FILE: ${PERSIST_FILE:-/data/.state.json}  # "off" to disable
    volumes:
      - split-flap-data:/data       # persisted state survives updates/reboots

  # Auto-updater: polls GHCR for a newer split-flap image and recreates the
  # container in place. Only touches containers labelled watchtower.enable=true.
  watchtower:
    image: containrrr/watchtower
    container_name: split-flap-watchtower
    restart: unless-stopped
    volumes:
      # Root-equivalent on the host — acceptable on a dedicated display Pi.
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # Watchtower's client otherwise negotiates an ancient Docker API version
      # (1.25) that modern Docker Engine rejects ("client version too old"),
      # which silently breaks every update check (issue #56). 1.40 is the
      # daemon's minimum, so it's safely in range; override if a daemon raises it.
      DOCKER_API_VERSION: ${DOCKER_API_VERSION:-1.40}
      WATCHTOWER_POLL_INTERVAL: ${WATCHTOWER_POLL_INTERVAL:-1200}  # seconds (~20 min)
      WATCHTOWER_LABEL_ENABLE: "true"   # only update opted-in containers
      WATCHTOWER_CLEANUP: "true"        # prune old images (saves SD-card space)

volumes:
  split-flap-data:
