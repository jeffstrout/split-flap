# Local image build override (developers, not the Pi).
#
# The base docker-compose.yml PULLS the prebuilt GHCR image. Layer this file on
# top to build the image from source instead — e.g. to test a change before it's
# published, or to bake a custom FLIP_SPEED (which CI fixes at the default 2).
#
# Build + run just the app (skip Watchtower) on a capable machine (Mac / CI):
#
#   docker compose -f docker-compose.yml -f docker-compose.build.yml \
#     up -d --build split-flap
#
# (Build on a Mac/CI, NOT a Pi 3B+ — the Vite build is memory-hungry.)
services:
  split-flap:
    build:
      context: .
      args:
        # Flip-animation speed baked into the client at build time.
        # 1 = original (gentlest on a Pi 3B+), 2 = default/2x.
        VITE_FLIP_SPEED: ${FLIP_SPEED:-2}
    # Prefer the freshly built image over pulling from GHCR.
    pull_policy: build
