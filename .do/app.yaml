name: split-flap

services:
  - name: api
    github:
      repo: jeffstrout/split-flap
      branch: main
      deploy_on_push: false
    source_dir: server
    environment_slug: node-js
    instance_count: 1
    instance_size_slug: basic-xxs   # $5/mo — 512MB RAM, 1 vCPU
    http_port: 3001
    run_command: npm start
    envs:
      - key: ALLOWED_ORIGINS
        scope: RUN_TIME
        value: ${_self.PUBLIC_URL}
    routes:
      - path: /api
        preserve_path_prefix: true

static_sites:
  - name: split-flap-frontend
    github:
      repo: jeffstrout/split-flap
      branch: main
      deploy_on_push: false
    source_dir: client
    build_command: npm install && npm run build
    output_dir: dist
    routes:
      - path: /
    catchall_document: index.html
